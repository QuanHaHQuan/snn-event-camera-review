# Maintenance rule:
# - Do not add A papers here just to make them P0; refined_level=A is P0 automatically.
# - p0_extra is only for high-value B/C background papers promoted to P0.
# - p1_extra is only for B/C papers worth optional reading.
# - advisor_track marks papers useful for understanding the SECNet / ICML 2026 method chain.
# - secnet_references should remain event-camera / visual-event-stream / SNN related.
#   Do not add generic architecture background papers here unless they are directly tied
#   to the project scope; learn those separately instead of expanding the core list.

